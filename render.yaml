services:
  - type: web
    name: faltek-web
    env: python
    rootDir: faltek
    buildCommand: bash build.sh
    startCommand: gunicorn faltek.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: faltek-db
          property: connectionString
      - key: MEDIA_ROOT
        value: /var/data/media
    disk:
      name: faltek-media
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: faltek-db
    databaseName: faltek
    user: faltek
