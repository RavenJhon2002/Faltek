{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload BOQ</title>
    <link rel="stylesheet" href="{% static 'core/css/simple-pages.css' %}?v=20260223_1">
    <link rel="stylesheet" href="{% static 'core/css/page-loader.css' %}?v=20260223_2">
</head>
<body class="simple-shell">
<main class="simple-wrap">
    <section class="simple-card">
        <h2>Upload BOQ for {{ project.name }}</h2>
        <p class="simple-note">Upload an Excel file to generate activities and scheduling data.</p>

        <form method="post" enctype="multipart/form-data" class="simple-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="simple-actions">
                <button type="submit" class="simple-btn simple-btn-primary">Upload Excel</button>
                <a href="{% url 'project_detail' project.id %}" class="simple-btn simple-btn-ghost">Back to Project</a>
            </div>
        </form>
    </section>
</main>
{% include 'core/partials/page_loader.html' %}
<script src="{% static 'core/js/page-loader.js' %}?v=20260223_2"></script>
</body>
</html>
